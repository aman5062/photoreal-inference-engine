# docker-compose.cpu.yml — CPU-only deployment (no GPU required)
# Usage:
#   docker compose -f docker-compose.cpu.yml up --build
#   docker compose -f docker-compose.cpu.yml run --rm app python src/main.py "your prompt"
#
# Note: CPU inference is much slower (~5-15 min per image).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: photoreal-engine:cpu
    container_name: photoreal-engine-cpu
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      - ./outputs:/app/outputs
      - hf_cache_cpu:/app/.cache/huggingface

    environment:
      - SD_MODEL=runwayml/stable-diffusion-v1-5
      - HF_HOME=/app/.cache/huggingface
      - PORT=8000

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  hf_cache_cpu:
    driver: local

