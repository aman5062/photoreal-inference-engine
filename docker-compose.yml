# docker-compose.yml — GPU (CUDA) deployment
# Usage:
#   docker compose up --build           # start API server
#   docker compose run --rm app python src/main.py "your prompt"
#
# Prerequisites:
#   1. NVIDIA GPU with ≥ 4 GB VRAM
#   2. NVIDIA Container Toolkit installed

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: photoreal-engine:gpu
    container_name: photoreal-engine-gpu
    restart: unless-stopped

    # GPU passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8000:8000"

    volumes:
      # Persist generated output images
      - ./outputs:/app/outputs
      # Persist HuggingFace model cache (SD 1.5 ~4 GB)
      - hf_cache:/app/.cache/huggingface

    environment:
      - SD_MODEL=runwayml/stable-diffusion-v1-5
      - HF_HOME=/app/.cache/huggingface
      - PORT=8000
      # Optional: set your HuggingFace token for gated model access
      # - HUGGING_FACE_HUB_TOKEN=hf_...

    # Health check: ping the /health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  hf_cache:
    driver: local

